<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Carrière | Accueil</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: var(--primary);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .btn {
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-add {
            background: var(--success);
            margin-bottom: 20px;
        }
        .btn-edit {
            background: var(--warning);
            font-size: 0.9em;
        }
        .btn-delete {
            background: var(--danger);
            font-size: 0.9em;
        }
        .btn:hover {
            opacity: 0.8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f8f9fa;
            color: var(--primary);
        }
        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Liste du Personnel</h1>
    
    <a href="{% url 'ajouter_employe' %}" class="btn btn-add">+ Ajouter un employé</a>

    <table>
        <thead>
            <tr>
                <th>Nom & Prénom</th>
                <th>Poste</th>
                <th>Email</th>
                <th>Date d’embauche</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for e in employes %}
            <tr>
                <td><strong>{{ e.nom }}</strong> {{ e.prenom }}</td>
                <td>{{ e.poste }}</td>
                <td>{{ e.email }}</td>
                <td>{{ e.date_embauche|date:"d/m/Y" }}</td>
                <td>
                    <a href="{% url 'modifier_employe' e.pk %}" class="btn btn-edit">Modifier</a>
                    <a href="{% url 'supprimer_employe' e.pk %}" class="btn btn-delete" onclick="return confirm('Supprimer cet employé ?')">Supprimer</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" style="text-align: center; color: #888;">Aucun employé enregistré.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
